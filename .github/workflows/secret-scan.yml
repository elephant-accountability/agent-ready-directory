name: Secret scan (TruffleHog)

# Catches accidental commits of API keys, tokens, or .env contents.
# Runs on every PR + every push. Hard-fails on any verified secret.
#
# Why TruffleHog (not Gitleaks):
#   Gitleaks-action requires a paid GITLEAKS_LICENSE for any GitHub
#   organization. TruffleHog v3 (AGPL-3.0) is free for org use and
#   verifies findings against the actual provider API to drop most
#   false positives.

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  trufflehog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified
