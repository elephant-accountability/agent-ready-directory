name: links

on:
  pull_request:
    paths:
      - "**/*.md"
      - "**/*.html"
      - "**/*.tsx"
      - "**/*.jsx"
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch:

jobs:
  lychee:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v6

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          # Cache for 1d, ignore localhost/.local, accept 5xx (flaky externals).
          args: >-
            --cache
            --max-cache-age 1d
            --max-redirects 5
            --max-concurrency 8
            --no-progress
            --include-fragments
            --exclude '^https?://localhost'
            --exclude '^https?://127\.0\.0\.1'
            --exclude '\.local(/|$)'
            --accept '200..=299,403,500..=599'
            './**/*.md'
            './**/*.html'
          fail: true
          jobSummary: true
          format: markdown
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
