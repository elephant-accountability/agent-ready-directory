repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: detect-private-key

  # TruffleHog v3 - free for org use (gitleaks now requires a paid org license).
  # Runs the trufflehog CLI in Docker so contributors do not need a local install.
  # Scans only commits since HEAD on commit/push so it is fast on day-to-day work.
  - repo: local
    hooks:
      - id: trufflehog
        name: TruffleHog
        description: Detect verified secrets before commit/push.
        entry: bash -c 'docker run --rm -v "$PWD:/workdir" -i trufflesecurity/trufflehog:latest git file:///workdir --since-commit HEAD --only-verified --fail'
        language: system
        stages: [pre-commit, pre-push]
