<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="page-title">Company — Agent-Ready Directory</title>
  <meta name="description" id="page-desc" content="Agent-discovery profile on the Agent-Ready Directory." />
  <link rel="stylesheet" href="/static/shared.css" />
  <style>
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      margin-bottom: var(--space-6);
    }
    .back-link:hover { color: #1A6B7A; text-decoration: none; }

    .company-header {
      display: flex;
      align-items: flex-start;
      gap: var(--space-5);
      margin-bottom: var(--space-6);
    }

    .logo-lg {
      width: 72px; height: 72px;
      border-radius: var(--radius-lg);
      background: var(--color-bg);
      border: 1.5px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: var(--text-2xl);
      color: #1A6B7A;
      flex-shrink: 0;
      overflow: hidden;
    }

    .logo-lg img { width: 100%; height: 100%; object-fit: contain; }

    .company-meta h1 {
      font-size: var(--text-3xl);
      font-weight: 700;
      color: #1A6B7A;
      letter-spacing: -0.02em;
      margin-bottom: var(--space-2);
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: var(--space-3);
      font-size: var(--text-sm);
      color: var(--color-text-muted);
    }

    /* Surfaces table */
    .surfaces-section {
      margin-top: var(--space-8);
    }

    .surfaces-section h2 {
      font-size: var(--text-xl);
      font-weight: 700;
      color: #1A6B7A;
      margin-bottom: var(--space-4);
    }

    .surfaces-grid {
      display: grid;
      gap: var(--space-3);
    }

    .surface-row {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      background: var(--white);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: var(--space-4) var(--space-5);
    }

    .surface-icon {
      width: 40px; height: 40px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: var(--text-sm);
      font-weight: 700;
    }

    .surface-icon-ok    { background: #d1fae5; color: #065f46; }
    .surface-icon-stale { background: #fef3c7; color: #92400e; }
    .surface-icon-no    { background: var(--gray-100); color: var(--gray-400); }

    .surface-info { flex: 1; }
    .surface-name  {
      font-weight: 600;
      font-size: var(--text-sm);
      color: var(--color-text);
    }
    .surface-desc {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      margin-top: 2px;
    }
    .surface-url {
      font-size: var(--text-xs);
      color: #1A6B7A;
      word-break: break-all;
      margin-top: 4px;
    }
    .surface-status-pill {
      font-size: var(--text-xs);
      font-weight: 600;
      padding: 3px 10px;
      border-radius: var(--radius-full);
      white-space: nowrap;
    }
    .status-ok    { background: #d1fae5; color: #065f46; }
    .status-stale { background: #fef3c7; color: #92400e; }
    .status-no    { background: var(--gray-100); color: var(--gray-400); }

    .checked-at {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      margin-top: var(--space-4);
    }

    /* Info cards */
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-4);
      margin-top: var(--space-8);
    }

    @media (max-width: 600px) {
      .info-grid { grid-template-columns: 1fr; }
      .company-header { flex-direction: column; }
      .company-meta h1 { font-size: var(--text-2xl); }
    }

    .info-card {
      background: var(--white);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: var(--space-5);
    }

    .info-card h3 {
      font-size: var(--text-xs);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
      color: var(--color-text-muted);
      margin-bottom: var(--space-3);
    }

    .info-card p, .info-card a {
      font-size: var(--text-sm);
      color: var(--color-text);
    }

    .not-found {
      text-align: center;
      padding: var(--space-20) 0;
    }
  </style>
</head>
<body>

<nav class="nav">
  <div class="container nav-inner">
    <a href="/" class="nav-logo">
      <!-- Elephant Accountability wordmark -->
      <svg viewBox="0 0 32 32" fill="none" aria-label="Elephant Accountability">
        <circle cx="16" cy="16" r="14" fill="rgba(241,236,221,0.15)" stroke="#F1ECDD" stroke-width="1.5"/>
        <path d="M10 20c0-3.5 2.7-6 6-6s6 2.5 6 6" stroke="#F1ECDD" stroke-width="2" stroke-linecap="round"/>
        <circle cx="13" cy="13" r="1.5" fill="#F1ECDD"/>
        <circle cx="19" cy="13" r="1.5" fill="#F1ECDD"/>
        <path d="M10 24 Q16 27 22 24" stroke="#F1ECDD" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      </svg>
      <span style="display:flex;flex-direction:column;gap:1px;">
        <span style="font-weight:700;letter-spacing:-0.02em;">Elephant Accountability</span>
        <span style="font-size:0.6rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;opacity:0.75;">Certification Infrastructure</span>
      </span>
    </a>
    <ul class="nav-links">
      <li><a href="/">Directory</a></li>
      <li><a href="/about">About</a></li>
      <li><a href="/submit" class="nav-submit-btn">+ Submit</a></li>
    </ul>
  </div>
</nav>

<main class="section">
  <div class="container" style="max-width: 800px;">

    <a href="/" class="back-link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="m15 18-6-6 6-6"/>
      </svg>
      Back to Directory
    </a>

    <div id="company-content">
      <!-- Loading skeleton -->
      <div class="company-header">
        <div class="logo-lg skeleton" style="border:none;background:var(--gray-200)"></div>
        <div style="flex:1">
          <div class="skeleton skeleton-line" style="width:60%;height:28px;margin-bottom:12px"></div>
          <div class="skeleton skeleton-line" style="width:40%;height:14px"></div>
        </div>
      </div>
      <div class="skeleton skeleton-line" style="height:80px"></div>
    </div>

  </div>
</main>

<footer class="footer">
  <div class="container">
    <div class="footer-bottom">
      <span>© 2026 Elephant Accountability LLC</span>
      <a href="/" style="color:rgba(255,255,255,0.6)">← Back to Directory</a>
    </div>
  </div>
</footer>

<script>
  const SURFACE_META = {
    llms_txt:   { label: 'llms.txt',  path: '/llms.txt',            desc: 'Machine-readable site summary for LLMs' },
    mcp:        { label: 'MCP',       path: '/.well-known/mcp.json', desc: 'Model Context Protocol endpoint' },
    a2a:        { label: 'A2A',       path: '/.well-known/agent.json', desc: 'Agent-to-Agent protocol manifest' },
    ucp:        { label: 'UCP',       path: '/.well-known/ucp.json', desc: 'Universal Context Protocol' },
    schema_org: { label: 'Schema.org', path: '/',                   desc: 'Structured data (ld+json) in HTML' },
  };

  function escHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function initials(name) {
    return name.split(/\s+/).slice(0, 2).map(w => w[0]).join('').toUpperCase();
  }

  function formatDate(iso) {
    if (!iso) return 'Never';
    try {
      return new Date(iso).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
    } catch { return iso; }
  }

  // Freshness window matches the verify_all_weekly cron in app/scheduler.py
  // (Sun 04:00 UTC). Surfaces older than this lose the "Detected" pill and
  // get marked "Stale" instead, even if last_verified_at is non-null.
  const STALE_DAYS = 7;
  const MS_PER_DAY = 86400000;

  function daysSinceIso(iso) {
    if (!iso) return null;
    const t = Date.parse(iso);
    if (isNaN(t)) return null;
    return Math.floor((Date.now() - t) / MS_PER_DAY);
  }

  async function loadCompany() {
    const slug = location.pathname.replace('/company/', '').replace(/\/$/, '');
    const content = document.getElementById('company-content');

    try {
      const resp = await fetch(`/api/companies/${encodeURIComponent(slug)}`);
      if (!resp.ok) {
        content.innerHTML = `<div class="not-found"><h2>Company not found</h2><p><a href="/">Back to directory →</a></p></div>`;
        return;
      }

      const c = await resp.json();

      document.title = `${c.name} — Agent-Ready Directory`;
      document.getElementById('page-title').textContent = `${c.name} — Agent-Ready Directory`;
      document.getElementById('page-desc').setAttribute('content', c.description || `${c.name} agent-discovery profile.`);

      // Build surface rows
      const surfaceMap = {};
      (c.surfaces || []).forEach(s => { surfaceMap[s.surface] = s; });

      const companyDays = daysSinceIso(c.last_checked_at);
      const companyIsStale = companyDays !== null && companyDays > STALE_DAYS;

      const surfaceRows = Object.entries(SURFACE_META).map(([key, meta]) => {
        const s = surfaceMap[key] || {};
        const detected = s.verified === 1 || s.verified === true;
        // Per-surface freshness: prefer the surface's own last_verified_at
        // (set when this surface was last seen detected), fall back to the
        // company-level last_checked_at (when the surface was last probed).
        const surfaceDays = daysSinceIso(s.last_verified_at) ?? companyDays;
        const isStale = detected && surfaceDays !== null && surfaceDays > STALE_DAYS;

        let iconCls, pillCls, pillText, iconChar;
        if (!detected) {
          iconCls = 'surface-icon-no';   pillCls = 'status-no';    pillText = 'Not found'; iconChar = '–';
        } else if (isStale) {
          iconCls = 'surface-icon-stale'; pillCls = 'status-stale'; pillText = `Stale (${surfaceDays}d)`; iconChar = '!';
        } else {
          iconCls = 'surface-icon-ok';   pillCls = 'status-ok';    pillText = 'Detected'; iconChar = '✓';
        }

        return `
          <div class="surface-row">
            <div class="surface-icon ${iconCls}">${iconChar}</div>
            <div class="surface-info">
              <div class="surface-name">${escHtml(meta.label)}</div>
              <div class="surface-desc">${escHtml(meta.desc)}</div>
              ${detected && s.endpoint_url ? `<div class="surface-url"><a href="${escHtml(s.endpoint_url)}" target="_blank" rel="noopener">${escHtml(s.endpoint_url)}</a></div>` : ''}
            </div>
            <span class="surface-status-pill ${pillCls}">${pillText}</span>
          </div>
        `;
      }).join('');

      const logoHtml = c.logo_url
        ? `<img src="${escHtml(c.logo_url)}" alt="${escHtml(c.name)} logo" />`
        : `<span>${initials(c.name)}</span>`;

      const elephantBadge = c.elephant_verified
        ? `<span class="elephant-badge" style="font-size:var(--text-xs);font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--gold);background:rgba(197,150,27,0.1);border:1px solid rgba(197,150,27,0.3);border-radius:9999px;padding:3px 10px;">★ Elephant Verified</span>`
        : '';

      content.innerHTML = `
        <div class="company-header">
          <div class="logo-lg">${logoHtml}</div>
          <div class="company-meta">
            <h1>${escHtml(c.name)}</h1>
            <div class="meta-row">
              ${c.category ? `<span class="category-chip">${escHtml(c.category.toUpperCase())}</span>` : ''}
              <a href="https://${escHtml(c.domain)}" target="_blank" rel="noopener" style="font-size:var(--text-sm);color:#1A6B7A;">${escHtml(c.domain)} ↗</a>
              ${elephantBadge}
            </div>
          </div>
        </div>

        ${c.description ? `<p style="font-size:var(--text-base);color:var(--color-text-muted);line-height:1.7;margin-bottom:var(--space-4);">${escHtml(c.description)}</p>` : ''}

        <div class="surfaces-section">
          <h2>Agent-Discovery Surfaces</h2>
          <div class="surfaces-grid">${surfaceRows}</div>
          ${c.last_checked_at ? `<p class="checked-at">Last checked ${formatDate(c.last_checked_at)}${companyDays !== null ? ` &middot; ${companyDays === 0 ? 'today' : companyDays === 1 ? '1 day ago' : `${companyDays} days ago`}` : ''}${companyIsStale ? ` <span style="color:#92400e;font-weight:600;">(stale)</span>` : ''}</p>` : '<p class="checked-at" style="color:#92400e;">Never checked</p>'}
        </div>

        <div class="info-grid">
          <div class="info-card">
            <h3>Website</h3>
            <p><a href="${escHtml(c.website_url || `https://${c.domain}`)}" target="_blank" rel="noopener">${escHtml(c.website_url || `https://${c.domain}`)} ↗</a></p>
          </div>
          <div class="info-card">
            <h3>Listed Since</h3>
            <p>${formatDate(c.submitted_at)}</p>
          </div>
          <div class="info-card">
            <h3>Category</h3>
            <p>${escHtml(c.category || 'Uncategorized')}</p>
          </div>
          <div class="info-card">
            <h3>Status</h3>
            <p style="text-transform:capitalize;">${escHtml(c.status)}</p>
          </div>
        </div>

        <div style="margin-top:var(--space-8);padding:var(--space-5);background:rgba(26,107,122,0.05);border-radius:var(--radius-md);border-left:4px solid #1A6B7A;">
          <p style="font-size:var(--text-sm);color:var(--color-text-muted);margin-bottom:var(--space-2);"><strong style="color:#1A6B7A;">About this listing</strong></p>
          <p style="font-size:var(--text-sm);color:var(--color-text-muted);line-height:1.7;">
            Surface checks are automated. Each endpoint is fetched weekly with a 10-second timeout.
            Verification does not imply endorsement. <a href="/about">Learn more about our methodology →</a>
          </p>
        </div>
      `;

    } catch (err) {
      content.innerHTML = `<div class="not-found"><h2>Error loading company</h2><p>${err.message}</p></div>`;
    }
  }

  loadCompany();
</script>
</body>
</html>
